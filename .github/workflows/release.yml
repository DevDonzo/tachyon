name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-binaries:
    name: Build binaries (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal && rustup default stable

      - name: Build release binary
        run: cargo build --release -p tachyon-app

      - name: Stage artifact (Unix)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          mkdir -p dist tachyon-linux
          cp target/release/tachyon-app tachyon-linux/tachyon-app
          cp assets/logo.png tachyon-linux/tachyon.png
          cp packaging/linux/tachyon.desktop tachyon-linux/tachyon.desktop
          chmod +x tachyon-linux/tachyon-app
          zip -r "dist/tachyon-app-linux.zip" tachyon-linux

      - name: Stage artifact (macOS app)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          mkdir -p dist Tachyon.app/Contents/MacOS Tachyon.app/Contents/Resources icon.iconset
          cp target/release/tachyon-app Tachyon.app/Contents/MacOS/tachyon-app
          chmod +x Tachyon.app/Contents/MacOS/tachyon-app
          cp assets/logo.png Tachyon.app/Contents/Resources/logo.png
          sips -z 16 16 assets/logo.png --out icon.iconset/icon_16x16.png >/dev/null
          sips -z 32 32 assets/logo.png --out icon.iconset/icon_16x16@2x.png >/dev/null
          sips -z 32 32 assets/logo.png --out icon.iconset/icon_32x32.png >/dev/null
          sips -z 64 64 assets/logo.png --out icon.iconset/icon_32x32@2x.png >/dev/null
          sips -z 128 128 assets/logo.png --out icon.iconset/icon_128x128.png >/dev/null
          sips -z 256 256 assets/logo.png --out icon.iconset/icon_128x128@2x.png >/dev/null
          sips -z 256 256 assets/logo.png --out icon.iconset/icon_256x256.png >/dev/null
          sips -z 512 512 assets/logo.png --out icon.iconset/icon_256x256@2x.png >/dev/null
          iconutil -c icns icon.iconset -o Tachyon.app/Contents/Resources/Tachyon.icns
          cat > Tachyon.app/Contents/Info.plist <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>tachyon-app</string>
            <key>CFBundleIconFile</key>
            <string>Tachyon</string>
            <key>CFBundleIdentifier</key>
            <string>dev.tachyon.app</string>
            <key>CFBundleName</key>
            <string>Tachyon</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ github.ref_name }}</string>
            <key>LSMinimumSystemVersion</key>
            <string>12.0</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST
          zip -r "dist/tachyon-app-macos.zip" Tachyon.app

      - name: Stage artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path dist,tachyon-windows -Force | Out-Null
          Copy-Item "target/release/tachyon-app.exe" "tachyon-windows/tachyon-app.exe"
          Copy-Item "assets/logo.png" "tachyon-windows/tachyon.png"
          Compress-Archive -Path "tachyon-windows" -DestinationPath "dist/tachyon-app-windows.zip"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: tachyon-app-${{ runner.os }}
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish GitHub release assets
    runs-on: ubuntu-latest
    needs: build-binaries
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes
          fi
